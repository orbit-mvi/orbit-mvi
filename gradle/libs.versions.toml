gradleAndroidPlugin = "9.2.1"
gradleMavenPublishPlugin = "0.36.0"
markdownLintPlugin = "0.6.0"
detektPlugin = "1.23.8"
dokka = "2.2.0"
compose-multiplatform = "1.11.0"
koverPlugin = "0.9.8"

# Androidx
androidxActivityCompose = "1.13.0"
androidxAppcompat = "1.7.1"
androidxCollection = "1.6.0"
