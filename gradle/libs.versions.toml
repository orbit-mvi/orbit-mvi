androidxComposeMaterialIconsMultiplatform = "1.7.3"
androidxConstraintlayout = "2.2.1"
androidxLifecycle = "2.10.0"
androidxLifecycleMultiplatform = "2.10.0"
androidxNavigation = "2.9.8"
