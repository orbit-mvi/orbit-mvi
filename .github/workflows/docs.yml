name: Docusaurus

on:
  push:
    branches:
      - main
      - orbit/main
      - feature/**
    tags:
      - '**'
  pull_request:
    branches:
      - main
      - orbit/main
      - feature/**
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'rsync --dry-run (log changes, upload nothing)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: konan cache
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan

      - name: Build Dokka
        run: ./gradlew copyDokkaToWebsite

      - name: Build Docusaurus Docker Image
        uses: docker/build-push-action@v4
        with:
          context: website
          push: false
          tags: orbit-web:latest

      - name: Build Docusaurus
        run: |
          cd website
          docker run --rm -v ${{ github.workspace }}/website:/docusaurus -e RUN_MODE='build' orbit-web:latest

      - name: Archive website
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: |
            website/build

  deploy:
    name: Deploy to Dreamhost
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')))
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://orbit-mvi.org
    concurrency:
      group: docs-deploy
      cancel-in-progress: false
    steps:
      - name: Download website artifact
        uses: actions/download-artifact@v4
        with:
          name: website
          path: website/build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -az --delete \
            ${{ inputs.dry_run && '--dry-run --verbose' || '' }} \
            --exclude '.well-known' \
            --exclude '.htaccess' \
            -e "ssh -o StrictHostKeyChecking=yes" \
            website/build/ \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"
