name: Docusaurus

on:
  push:
    branches:
      - main
      - orbit/main
      - feature/**
    tags:
      - '**'
  pull_request:
    branches:
      - main
      - orbit/main
      - feature/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so generate-versions.mjs can extract docs from
          # release tags
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: konan cache
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan

      - name: Build Dokka
        run: ./gradlew copyDokkaToWebsite

      - name: Generate versioned docs
        run: node website/scripts/generate-versions.mjs

      - name: Build Docusaurus Docker Image
        uses: docker/build-push-action@v4
        with:
          context: website
          push: false
          tags: orbit-web:latest

      - name: Build Docusaurus
        run: |
          cd website
          docker run --rm -v ${{ github.workspace }}/website:/docusaurus -e RUN_MODE='build' orbit-web:latest

      - name: Archive website
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: |
            website/build
